<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="featBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="featAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#featBg)" rx="12"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#featAccent)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Key Features</text>

  <!-- ========== ROW 1 ========== -->

  <!-- Card 1: Multi-Tone Generation -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="55" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="55" width="235" height="4" rx="2" fill="#e63946"/>
    <text x="148" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e63946">🎨</text>
    <text x="148" y="107" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e5e5e5">Multi-Tone Generation</text>
    <text x="148" y="126" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Professional • Casual</text>
    <text x="148" y="142" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Persuasive • Consultative</text>
    <!-- Tone indicator dots -->
    <circle cx="105" cy="160" r="3" fill="#e63946" opacity="0.8"/>
    <circle cx="125" cy="160" r="3" fill="#ff6b6b" opacity="0.6"/>
    <circle cx="145" cy="160" r="3" fill="#e63946" opacity="0.5"/>
    <circle cx="165" cy="160" r="3" fill="#ff6b6b" opacity="0.4"/>
  </g>

  <!-- Card 2: A/B Test Variants -->
  <g filter="url(#cardShadow)">
    <rect x="283" y="55" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="283" y="55" width="235" height="4" rx="2" fill="#e63946"/>
    <text x="400" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e63946">🧪</text>
    <text x="400" y="107" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e5e5e5">A/B Test Variants</text>
    <text x="400" y="126" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Generate multiple email versions</text>
    <text x="400" y="142" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">for split testing &amp; optimization</text>
    <!-- A/B icons -->
    <rect x="370" y="152" width="22" height="16" rx="3" fill="none" stroke="#e63946" stroke-width="1" opacity="0.6"/>
    <text x="381" y="164" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold" fill="#e63946" opacity="0.7">A</text>
    <rect x="400" y="152" width="22" height="16" rx="3" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
    <text x="411" y="164" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold" fill="#ff6b6b" opacity="0.7">B</text>
  </g>

  <!-- Card 3: Follow-Up Sequences -->
  <g filter="url(#cardShadow)">
    <rect x="535" y="55" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="535" y="55" width="235" height="4" rx="2" fill="#e63946"/>
    <text x="653" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e63946">📧</text>
    <text x="653" y="107" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e5e5e5">Follow-Up Sequences</text>
    <text x="653" y="126" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">intro → value-add →</text>
    <text x="653" y="142" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">case-study → break-up</text>
    <!-- Timeline dots -->
    <circle cx="608" cy="160" r="4" fill="#e63946" opacity="0.9"/>
    <line x1="612" y1="160" x2="633" y2="160" stroke="#e63946" stroke-width="1" opacity="0.5"/>
    <circle cx="637" cy="160" r="4" fill="#e63946" opacity="0.7"/>
    <line x1="641" y1="160" x2="662" y2="160" stroke="#e63946" stroke-width="1" opacity="0.5"/>
    <circle cx="666" cy="160" r="4" fill="#e63946" opacity="0.5"/>
    <line x1="670" y1="160" x2="691" y2="160" stroke="#e63946" stroke-width="1" opacity="0.5"/>
    <circle cx="695" cy="160" r="4" fill="#e63946" opacity="0.3"/>
  </g>

  <!-- ========== ROW 2 ========== -->

  <!-- Card 4: Prospect Research Engine -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="195" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="30" y="195" width="235" height="4" rx="2" fill="#e63946"/>
    <text x="148" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e63946">🔍</text>
    <text x="148" y="247" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e5e5e5">Prospect Research</text>
    <text x="148" y="266" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Pain points • Talking points</text>
    <text x="148" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Industry context analysis</text>
    <!-- Research bars -->
    <rect x="100" y="292" width="40" height="5" rx="2" fill="#e63946" opacity="0.5"/>
    <rect x="145" y="292" width="30" height="5" rx="2" fill="#e63946" opacity="0.4"/>
    <rect x="180" y="292" width="35" height="5" rx="2" fill="#e63946" opacity="0.3"/>
  </g>

  <!-- Card 5: Personalization Scoring -->
  <g filter="url(#cardShadow)">
    <rect x="283" y="195" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="283" y="195" width="235" height="4" rx="2" fill="#e63946"/>
    <text x="400" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e63946">📊</text>
    <text x="400" y="247" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e5e5e5">Personalization Scoring</text>
    <text x="400" y="266" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Score emails 0-100 scale</text>
    <text x="400" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">with improvement suggestions</text>
    <!-- Score gauge -->
    <rect x="350" y="292" width="100" height="8" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
    <rect x="350" y="292" width="78" height="8" rx="4" fill="url(#featAccent)" opacity="0.7"/>
    <text x="460" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="bold" fill="#e63946">78%</text>
  </g>

  <!-- Card 6: Template Library -->
  <g filter="url(#cardShadow)">
    <rect x="535" y="195" width="235" height="120" rx="10" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
    <rect x="535" y="195" width="235" height="4" rx="2" fill="#e63946"/>
    <text x="653" y="225" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e63946">📋</text>
    <text x="653" y="247" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#e5e5e5">Template Library</text>
    <text x="653" y="266" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Cold outreach • Follow-up</text>
    <text x="653" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Demo request • Case study • Break-up</text>
    <!-- Template stack -->
    <rect x="633" y="290" width="40" height="6" rx="2" fill="#30363d" opacity="0.7"/>
    <rect x="630" y="296" width="46" height="6" rx="2" fill="#30363d" opacity="0.5"/>
    <rect x="627" y="302" width="52" height="6" rx="2" fill="#30363d" opacity="0.3"/>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="347" width="800" height="3" fill="url(#featAccent)"/>
</svg>
