<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="archAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="archGlow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#e63946" flood-opacity="0.3"/>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e63946"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#archBg)" rx="12"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#archAccent)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Architecture Pipeline</text>

  <!-- ========== ROW 1: Input → Processing ========== -->

  <!-- Box 1: Prospect Info (Input) -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="60" width="130" height="55" rx="8" fill="url(#boxGrad)" stroke="#e63946" stroke-width="1.5"/>
    <text x="95" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">👤</text>
    <text x="95" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Prospect Info</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="87" x2="195" y2="87" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Research Engine -->
  <g filter="url(#boxShadow)">
    <rect x="200" y="60" width="130" height="55" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1"/>
    <text x="265" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">🔍</text>
    <text x="265" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Research Engine</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="87" x2="365" y2="87" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Tone Selector -->
  <g filter="url(#boxShadow)">
    <rect x="370" y="60" width="130" height="55" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1"/>
    <text x="435" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">🎨</text>
    <text x="435" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Tone Selector</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="500" y1="87" x2="535" y2="87" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Template Library -->
  <g filter="url(#boxShadow)">
    <rect x="540" y="60" width="130" height="55" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1"/>
    <text x="605" y="82" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">📋</text>
    <text x="605" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Template Library</text>
  </g>

  <!-- Arrow down from Template Library to LLM Generator -->
  <line x1="605" y1="115" x2="605" y2="155" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ========== ROW 2: Core LLM Engine (centered, larger) ========== -->

  <!-- Box 5: LLM Email Generator (hero box) -->
  <g filter="url(#archGlow)">
    <rect x="265" y="160" width="270" height="65" rx="10" fill="url(#boxGrad)" stroke="#e63946" stroke-width="2"/>
    <text x="400" y="188" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#e63946">⚡</text>
    <text x="400" y="208" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">LLM Email Generator</text>
  </g>

  <!-- Arrow down from Research Engine to LLM -->
  <path d="M265,115 L265,140 L340,140 L340,160" fill="none" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Arrow down from Tone Selector to LLM -->
  <line x1="435" y1="115" x2="435" y2="155" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)" opacity="0.7"/>

  <!-- Config input arrow -->
  <g>
    <rect x="30" y="170" width="100" height="45" rx="6" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" opacity="0.8"/>
    <text x="80" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e63946">⚙️</text>
    <text x="80" y="205" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">config.yaml</text>
  </g>
  <line x1="130" y1="192" x2="260" y2="192" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- Ollama/Model box -->
  <g>
    <rect x="670" y="170" width="100" height="45" rx="6" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" opacity="0.8"/>
    <text x="720" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e63946">🤖</text>
    <text x="720" y="205" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Ollama LLM</text>
  </g>
  <line x1="540" y1="192" x2="665" y2="192" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- ========== ROW 3: Output Processing ========== -->

  <!-- Arrow from LLM down to three outputs -->
  <line x1="340" y1="225" x2="340" y2="260" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="225" x2="400" y2="260" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="225" x2="460" y2="260" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Box 6: Variant Creator -->
  <g filter="url(#boxShadow)">
    <rect x="80" y="265" width="140" height="55" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1"/>
    <text x="150" y="287" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">🧪</text>
    <text x="150" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Variant Creator</text>
  </g>

  <!-- Box 7: Sequence Builder -->
  <g filter="url(#boxShadow)">
    <rect x="250" y="265" width="140" height="55" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1"/>
    <text x="320" y="287" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">📧</text>
    <text x="320" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Sequence Builder</text>
  </g>

  <!-- Box 8: Personalization Scorer -->
  <g filter="url(#boxShadow)">
    <rect x="420" y="265" width="160" height="55" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1"/>
    <text x="500" y="287" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e63946">📊</text>
    <text x="500" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e5e5e5">Personalization Scorer</text>
  </g>

  <!-- Connecting arrows from LLM to Row 3 boxes -->
  <path d="M340,260 L340,250 L150,250 L150,265" fill="none" stroke="#e63946" stroke-width="1.2" marker-end="url(#arrowhead)" opacity="0.7"/>
  <path d="M460,260 L460,250 L500,250 L500,265" fill="none" stroke="#e63946" stroke-width="1.2" marker-end="url(#arrowhead)" opacity="0.7"/>

  <!-- ========== ROW 4: Final Output ========== -->

  <!-- Arrows down to output -->
  <line x1="150" y1="320" x2="150" y2="345" stroke="#e63946" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="320" x2="320" y2="345" stroke="#e63946" stroke-width="1" opacity="0.6"/>
  <line x1="500" y1="320" x2="500" y2="345" stroke="#e63946" stroke-width="1" opacity="0.6"/>

  <!-- Box 9: Rich Output (spanning) -->
  <g filter="url(#archGlow)">
    <rect x="80" y="348" width="580" height="40" rx="8" fill="url(#boxGrad)" stroke="#e63946" stroke-width="1.5"/>
    <text x="370" y="374" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">🖥️  Rich Output  •  CLI  •  Web UI  •  Streamlit Dashboard</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="397" width="800" height="3" fill="url(#archAccent)"/>
</svg>
